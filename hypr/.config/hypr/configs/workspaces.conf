# auto create special workspaces and launch apps when they are empty
workspace = special:top, on-created-empty:exec vesktop
workspace = special:bottom, on-created-empty:exec steam
workspace = special:left, on-created-empty:exec gtk-launch youtube
workspace = special:right, on-created-empty:exec deadlock-modmanager

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2
