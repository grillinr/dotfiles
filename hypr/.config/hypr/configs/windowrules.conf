layerrule {
  name = rofi
  match:namespace = ^(rofi)$
  blur = on
  ignore_alpha = 0.5
}

layerrule {
  name = walker
  match:namespace = ^(walker)$
  blur = off
  ignore_alpha = 0.5
}

layerrule {
  name = wlogout
  match:namespace = ^(wlogout)$
  blur = on
  ignore_alpha = 0.5
}

layerrule {
  name = waybar
  match:namespace = ^(waybar)$
  blur = on
  ignore_alpha = 0
}

windowrule {
  name = vesktop
  match:class = ^(vesktop)$
  workspace = special:top
}

windowrule {
  name = steam
  match:class = ^(steam)$
  workspace = special:bottom
}

windowrule = float on, match:class ^(spotify)$

# TUI overlay windows
# Network overlay (impala)
windowrule {
  name = network-overlay
  match:class = ^(network-overlay)$
  float = on
  size = 800 600
  move = (monitor_w-805) 45
  animation = slide
}

# Bluetooth overlay (bluetui)
windowrule {
  name = bluetooth-overlay
  match:class = ^(bluetooth-overlay)$
  float = on
  size = 800 600
  move = (monitor_w-805) 45
  animation = slide
}

# Audio overlay (ncpamixer)
windowrule {
  name = audio-overlay
  match:class = ^(audio-overlay)$
  float = on
  size = 800 600
  move = (monitor_w-805) 45
  animation = slide
}

# System monitor overlay (btop)
windowrule {
  name = btop-overlay
  match:class = ^(btop-overlay)$
  float = on
  size = 800 600
  move = (monitor_w-805) 45
  animation = slide
}
